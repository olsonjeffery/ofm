# `models.yml` — oh-my-pi provider configuration example
#
# This file defines the providers and models available to oh-my-pi.
# It is passed to `omp rpc` via the `OMP_MODELS_YML` environment variable.
#
# See https://omp.sh/docs/custom-models for full documentation.

# --- OpenCode Zen (hosted by omp.sh) ---
opencode-zen:
  api_key: "${OMP_ZEN_API_KEY}"         # Store in env var, never hardcode keys
  type: zen

# --- OpenCode Go (self-hosted) ---
opencode-go:
  api_key: "${OMP_GO_API_KEY}"
  endpoint: "https://go.opencode.example.com"
  type: zen

# --- Anthropic / Claude via API key ---
anthropic-claude:
  api_key: "${ANTHROPIC_API_KEY}"
  type: anthropic
  models:
    - claude-sonnet-4-20250514
    - claude-opus-4-20250514

# --- OpenAI via API key ---
openai-gpt:
  api_key: "${OPENAI_API_KEY}"
  type: openai
  models:
    - gpt-4o
    - gpt-4o-mini

# --- Local via llama.cpp / ollama ---
local-llama:
  type: openai
  endpoint: "http://localhost:11434/v1"
  models:
    - llama3.2
    - qwen2.5-coder

# --- Tier-1 provider (Google / Gemini) ---
gemini-pro:
  api_key: "${GEMINI_API_KEY}"
  type: google
  models:
    - gemini-2.5-pro
    - gemini-2.5-flash
